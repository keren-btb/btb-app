    <script>
const SB_URL='https://dcksohetvlonijtcbjwe.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRja3NvaGV0dmxvbmlqdGNiandlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTQ1NzgsImV4cCI6MjA5NjQzMDU3OH0.M_oDB2e0upZUYZijNmigsmXtcKaAFx8iF-nn5FZUkzk';
const SB_AUTH=`${SB_URL}/auth/v1`;
// SECURITY: H() now sends the real logged-in staff member's session token
// for every data request (falls back to the anon key only if nobody is
// logged in yet, e.g. requests that fire before login completes).
// apikey always stays as the project anon key (Supabase requirement,
// separate from Authorization) — matches the pattern used in pos.html.
const H = (k) => {
  const token = k || (currentUser && currentUser.token) || SB_ANON;
  return {'Content-Type':'application/json','Authorization':`Bearer ${token}`,'apikey':SB_ANON};
};
const EDGE_FN=`${SB_URL}/functions/v1/btb-admin`;
async function callEdgeFunction(action,params={},token=null){
  const headers={'Content-Type':'application/json','Authorization':`Bearer ${token||SB_ANON}`,'apikey':SB_ANON};
  const r=await fetch(EDGE_FN,{method:'POST',headers,body:JSON.stringify({action,...params})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`Edge function error ${r.status}`)}
  return r.json();
}

// BUILD VERSION — bump this each time this file is shipped, so you can
// confirm in the header (and browser console) which copy you're looking at.
const BUILD_VERSION = '1.3.0'; // v1.3.0: new staff-entered enquiries now also log
// as a client_interactions entry (inbound, needs reply) so they show up right
// away in client_inbox.html / client_overview.html, instead of only appearing
// once someone has already replied. NZ timezone fix — see below
// v1.2.1: fixed a real bug — the default enquiry date was using
// new Date().toISOString().slice(0,10), which is UTC, not NZ time. Since NZ
// is UTC+12/+13, that showed *yesterday's* date as the default for roughly
// the first half of every NZ day. Now uses nzToday() (Pacific/Auckland).
// (token refresh, expiry tracking, background role re-validation) matching
// btb_app.html/pos.html, plus the same session-restore speed fix.
console.log(`%cEnquiries — build v${BUILD_VERSION}`, 'color:#07b4c5;font-weight:bold;font-size:13px');

// ============================================================
// NZ TIMEZONE HELPER — always use this instead of new Date() when you mean "today" in NZ
// ============================================================
function nzToday() {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Pacific/Auckland', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
}
// DEFAULT DATA — matches btb_app.html defaults, overwritten by loadSettings() below
let games=[
  {id:'g1',name:'Sherlock',duration:60,pricingType:'per_person_tiered',icon:'🔍',bookable:true,category:'escape'},
  {id:'g2',name:'Saving Christmas',duration:60,pricingType:'per_person_tiered',icon:'🎄',bookable:true,category:'escape'},
  {id:'g3',name:'Gregg in the Box',duration:45,pricingType:'per_person_tiered',icon:'📦',bookable:true,category:'escape'},
  {id:'g4',name:'VR Hour',duration:60,pricingType:'per_hour_flat',icon:'🥽',bookable:true,category:'vr'},
  {id:'g5',name:'Board Game Cafe',duration:60,pricingType:'per_person_per_hour',icon:'🎲',bookable:true,category:'cafe'},
];
let tags=[{id:'birthday',label:'Birthday',colorIdx:3},{id:'prepaid',label:'Prepaid',colorIdx:0},{id:'vip',label:'VIP',colorIdx:4},{id:'allergy',label:'Allergy',colorIdx:5}];
let statuses=[{id:'new',label:'New',emoji:'🔵'},{id:'followup',label:'Follow up',emoji:'🟡'},{id:'hot',label:'Hot',emoji:'🔥'},{id:'converted',label:'Converted',emoji:'✅'}];
let staff=[],enquiries=[],abandonedDrafts=[];
let activeEnqStatus=null,enqOpen=false,activeEnqView='enquiry';
let currentUser=null;
let enquiryTemplates=[];
let openReplyId=null;
let tplAdminOpen=false;
let openEmailInteractions={}; // clientId -> most recent open interaction created_at

function initials(n){return n.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
// SETTINGS — only the keys Enquiries actually needs (games/tags/statuses)
async function loadSettings(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/settings`,{headers:H()});
    const rows=await r.json();
    rows.forEach(row=>{
      try{
        const d=JSON.parse(row.value);
        if(row.key==='btb_games'&&Array.isArray(d))games=d;
        if(row.key==='btb_tags'&&Array.isArray(d))tags=d;
        if(row.key==='btb_statuses'&&Array.isArray(d))statuses=d;
      }catch(e){}
    });
  }catch(e){console.error('Settings load:',e)}
}

// STAFF — trimmed: no training data, no renderPersonList (Settings-only concerns)
async function loadStaff(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/staff?active=eq.true&order=name`,{headers:H()});
    const rows=await r.json();
    if(rows&&rows.length>0)staff=rows;
  }catch(e){console.error('Staff load:',e)}
}

// ENQUIRY EMAIL TEMPLATES
async function loadEnquiryTemplates(){
  if(!currentUser)return;
  try{
    enquiryTemplates=await callEdgeFunction('list_enquiry_templates',{},currentUser.token);
  }catch(e){console.error('Templates load:',e)}
}
async function loadOpenEmailInteractions(){
  if(!currentUser)return;
  try{
    const rows=await callEdgeFunction('list_open_email_interactions',{},currentUser.token);
    openEmailInteractions={};
    (rows||[]).forEach(r=>{
      if(!openEmailInteractions[r.client_id])openEmailInteractions[r.client_id]=r.created_at;
    });
  }catch(e){console.error('Open interactions load:',e)}
}

// ENQUIRIES
async function loadEnquiries(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/game_bookings?status=in.(enquiry,abandoned)&order=created_at.desc&select=*,clients(first_name,last_name,phone,email)`,{headers:H()});
    const rows=await r.json();
    const mapped=rows.map(row=>{
      const nameParts=row.notes_when_booked?.split('·')||[];
      const name=nameParts[0]?.trim()||'Unknown';
      // Abandoned drafts have no client_id, so phone/email are pulled out of
      // the notes text instead of the clients join.
      const emailMatch=row.notes_when_booked?.match(/\S+@\S+\.\S+/);
      const phoneMatch=row.notes_when_booked?.match(/(\+?\d[\d \-]{6,}\d)/);
      return{
        id:row.id,name,
        detail:row.notes_when_booked||'',
        clientId:row.client_id||null,
        game:row.game_name,date:row.booking_date,
        players:row.players_booked,
        phone:row.clients?.phone||(phoneMatch?phoneMatch[0]:''),
        email:row.clients?.email||(emailMatch?emailMatch[0]:''),
        occasion:row.occasion||'',
        experience:row.experience||'',
        source:row.source||'online',
        notes:JSON.parse(row.staff_notes||'[]'),
        created_at:row.created_at,
        status:row.enquiry_status||'new',
        bookingStatus:row.status,
        initials:'??',
      };
    });
    enquiries=mapped.filter(e=>e.bookingStatus==='enquiry');
    abandonedDrafts=mapped.filter(e=>e.bookingStatus==='abandoned');
    [...enquiries,...abandonedDrafts].forEach(e=>{e.initials=initials(e.name)});
  }catch(e){console.error('Enquiries load:',e)}
}
  function toggleEnqForm(){
  enqOpen=!enqOpen;document.getElementById('enqForm').style.display=enqOpen?'':'none';
  if(enqOpen){
    document.getElementById('eqStatus').innerHTML=statuses.map(s=>`<option value="${s.id}">${s.emoji} ${s.label}</option>`).join('');
    document.getElementById('eqEnteredBy').innerHTML=staff.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const gameEl=document.getElementById('eqGame');
    if(gameEl)gameEl.innerHTML='<option value="">Any / not sure</option>'+games.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
    document.getElementById('eqFirst').focus();
  }
}
async function submitEnquiry(){
  const first=document.getElementById('eqFirst').value.trim();
  const last=document.getElementById('eqLast').value.trim();
  const name=[first,last].filter(Boolean).join(' ');
  if(!first){document.getElementById('eqFirst').focus();return}
  const phone=document.getElementById('eqPhone').value.trim();
  const email=document.getElementById('eqEmail').value.trim();
  const gameId=document.getElementById('eqGame').value;
  const gameName=gameId?games.find(g=>g.id===gameId)?.name||'Enquiry':'Enquiry';
  const eqDate=document.getElementById('eqDate').value||nzToday();
  const players=parseInt(document.getElementById('eqPlayers').value)||1;
  const occasion=document.getElementById('eqOccasion').value;
  const experience=document.getElementById('eqExperience').value;
  const detail=document.getElementById('eqDetail').value.trim();
  const statusId=document.getElementById('eqStatus').value;
  // Auto-add experience tag if matches a tag name
  const autoTags=[];
  if(occasion){const ot=tags.find(t=>t.label.toLowerCase().includes(occasion.toLowerCase().split(' ')[0]));if(ot)autoTags.push(ot.id)}
  try{
    // Find or create client
    let clientId=null;
    if(email||phone){
      const qParam=email?`email=eq.${encodeURIComponent(email)}`:`phone=eq.${encodeURIComponent(phone)}`;
      const cr=await fetch(`${SB_URL}/rest/v1/clients?${qParam}&select=id`,{headers:H()});
      const ex=await cr.json();
      if(ex.length>0){clientId=ex[0].id}
      else{
        const nr=await fetch(`${SB_URL}/rest/v1/clients`,{method:'POST',headers:{...H(),'Prefer':'return=representation'},body:JSON.stringify({first_name:first,last_name:last||null,email:email||null,phone:phone||null,source:'staff'})});
        const nc=await nr.json();clientId=nc[0]?.id;
      }
    }
    const r=await fetch(`${SB_URL}/rest/v1/game_bookings`,{
      method:'POST',headers:{...H(),'Prefer':'return=representation'},
      body:JSON.stringify({
        client_id:clientId,
        game_id:gameId||'enquiry',game_name:gameName,
        booking_date:eqDate,slot_time:'12:00:00',
        players_booked:players,
        occasion:occasion||null,experience:experience||null,
        status:'enquiry',source:'staff',
        notes_when_booked:`${name}${phone?' · '+phone:''}${email?' · '+email:''}${detail?' · '+detail:''}`,
        tags:JSON.stringify(autoTags),staff_notes:JSON.stringify([]),
        assigned_staff_ids:JSON.stringify([]),
        enquiry_status:statusId,
      })
    });
    if(r.ok){
      // Log this as a contact entry so the new enquiry shows up immediately
      // in the client inbox/overview "Needs reply" queue, not just here.
      if(clientId){
        const summary=`New enquiry: ${gameName}${players?` for ${players} players`:''}${eqDate?` on ${eqDate}`:''}${occasion?` (${occasion})`:''}${detail?' — '+detail:''}`;
        fetch(`${SB_URL}/rest/v1/client_interactions`,{
          method:'POST',headers:H(),
          body:JSON.stringify({client_id:clientId,type:'other',direction:'inbound',content:summary,to_do:true,to_do_done:false})
        }).catch(e=>console.error('Enquiry contact logging failed (non-blocking):',e));
      }
      enqOpen=false;document.getElementById('enqForm').style.display='none';
      ['eqFirst','eqLast','eqPhone','eqEmail','eqPlayers','eqDetail'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
      const gameEl=document.getElementById('eqGame');if(gameEl)gameEl.value='';
      const occEl=document.getElementById('eqOccasion');if(occEl)occEl.value='';
      const expEl=document.getElementById('eqExperience');if(expEl)expEl.value='';
      await loadEnquiries();renderEnquiries();updateHeader();
    }else{alert('Error: '+await r.text())}
  }catch(e){alert('Error: '+e.message)}
}
function renderEnquiries(){
  const list=document.getElementById('enqList');
  const source=activeEnqView==='abandoned'?abandonedDrafts:enquiries;
  let filtered=[...source];
  if(activeEnqView==='enquiry'&&activeEnqStatus)filtered=filtered.filter(e=>e.status===activeEnqStatus);
  if(!filtered.length){list.innerHTML=`<div class="empty-state">No ${activeEnqView==='abandoned'?'abandoned bookings':'enquiries'}.</div>`;return}
  list.innerHTML=filtered.map(e=>{
    const statusBtns=activeEnqView==='abandoned'?'':statuses.map(s=>`<button class="enq-status-btn ${e.status===s.id?'active':''}" onclick="setEnqStatus('${e.id}','${s.id}')">${s.emoji} ${s.label}</button>`).join('');
      
    const noteLines=(e.notes||[]).map(n=>{
      if(typeof n==='object'&&n.text) return `<div class="note-line">📝 ${escapeHtml(n.text)}<span style="font-size:10px;color:#9ca3af;margin-left:6px">${escapeHtml(n.by||'')}${n.at?' · '+new Date(n.at).toLocaleDateString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):''}</span></div>`;
      return `<div class="note-line">📝 ${escapeHtml(n)}</div>`;
    }).join('');
  const srcBadge=e.source==='online'?'<span style="font-size:10px;background:#ede9fe;color:#7c3aed;padding:1px 7px;border-radius:99px;font-weight:600">🌐 Online</span>':'<span style="font-size:10px;background:#e0f7f9;color:#07b4c5;padding:1px 7px;border-radius:99px;font-weight:600">Staff</span>';
    const awaitingAt=e.clientId?openEmailInteractions[e.clientId]:null;
    const awaitBadge=awaitingAt?`<span style="font-size:10px;background:#fef3c7;color:#b45309;padding:1px 7px;border-radius:99px;font-weight:600">⏳ Awaiting reply — sent ${new Date(awaitingAt).toLocaleDateString('en-NZ',{day:'numeric',month:'short'})}</span>`:'';
    return`<div class="enq-card ${e.source==='online'?'online':''}">
      <div style="display:flex;align-items:flex-start;gap:9px">
        <div class="enq-avatar">${escapeHtml(e.initials)}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <div class="enq-name">${escapeHtml(e.name)}</div>
            ${srcBadge}
            ${awaitBadge}
          </div>
          <div class="enq-detail" style="margin-top:2px">${escapeHtml(e.detail||'')}</div>
          ${e.phone?`<div style="font-size:11px;color:#6b7280;margin-top:2px">📞 ${escapeHtml(e.phone)}</div>`:''}
          ${e.email?`<div style="font-size:11px;color:#6b7280">✉️ ${escapeHtml(e.email)}</div>`:''}
          ${e.game&&e.game!=='Enquiry'?`<div style="font-size:11px;color:#6b7280;margin-top:2px">🎮 ${escapeHtml(e.game)}${e.players>1?' · '+e.players+' players':''}${e.date?' · '+escapeHtml(e.date):''}</div>`:''}
          ${e.occasion?`<div style="font-size:11px;color:#6b7280">🎉 ${escapeHtml(e.occasion)}</div>`:''}
          ${e.experience?`<div style="font-size:11px;color:#6b7280">⭐ ${escapeHtml(e.experience)}</div>`:''}
${noteLines?`<div style="margin-top:5px">${noteLines}</div>`:''}
         ${activeEnqView==='abandoned'?'':`<div class="note-input-row" style="margin-top:7px">
            <input class="note-input" type="text" placeholder="Add note…" data-enq="${e.id}">
            <button class="note-save-btn" onclick="saveEnqNote('${e.id}',this)">Save</button>
          </div>
          <div class="enq-status-row">${statusBtns}</div>
          ${e.email?`<div style="margin-top:7px"><button class="note-save-btn" style="background:#07b4c5" onclick="toggleReplyPanel('${e.id}')">✉️ ${openReplyId===e.id?'Close':'Reply'}</button></div>`:''}
          ${openReplyId===e.id?renderReplyPanel(e):''}`}
        </div>
      </div>
    </div>`;
  }).join('');
}
function renderReplyPanel(e){
  const first=(e.name||'').trim().split(' ')[0]||'there';
  const tpl=enquiryTemplates.find(t=>t.id===(replyState[e.id]?.templateId))||null;
  const subject=replyState[e.id]?.subject??'';
  const bodyText=replyState[e.id]?.body??'';
  return `<div class="form-wrap" style="margin-top:9px;padding:12px">
    <div class="form-row"><div class="form-label">Template</div>
      <select class="form-select" onchange="applyTemplate('${e.id}',this.value)">
        <option value="">Choose a template…</option>
        ${enquiryTemplates.map(t=>`<option value="${t.id}" ${tpl&&tpl.id===t.id?'selected':''}>${escapeHtml(t.name)}</option>`).join('')}
      </select>
    </div>

    <button class="note-save-btn" style="background:#07b4c5" onclick="sendReply('${e.id}')">Send email</button>
  </div>`;
}

async function saveTemplate(id){
  const msgEl=document.getElementById(`tplMsg_${id}`);
  const t=enquiryTemplates.find(x=>x.id===id);
  try{
    await callEdgeFunction('save_enquiry_template',{
      id,
      name:document.getElementById(`tplName_${id}`).value.trim(),
      subject:document.getElementById(`tplSubject_${id}`).value.trim(),
      from_name:document.getElementById(`tplFromName_${id}`).value.trim(),
      from_email:document.getElementById(`tplFromEmail_${id}`).value.trim(),
      body:document.getElementById(`tplBody_${id}`).value,
      active:true,sort_order:t?.sort_order??0,
    },currentUser.token);
    if(msgEl){msgEl.textContent='Saved ✓';msgEl.style.color='#059669'}
    await loadEnquiryTemplates();
  }catch(e){if(msgEl){msgEl.textContent='Error: '+e.message;msgEl.style.color='#dc2626'}}
}
async function deleteTemplate(id){
  if(!confirm('Delete this template? This can\'t be undone.'))return;
  try{
    await callEdgeFunction('delete_enquiry_template',{id},currentUser.token);
    await loadEnquiryTemplates();renderTemplateAdmin();
  }catch(e){alert('Error: '+e.message)}
}
async function createTemplate(){
  const msgEl=document.getElementById('tplNewMsg');
  const name=document.getElementById('tplNewName').value.trim();
  const subject=document.getElementById('tplNewSubject').value.trim();
  if(!name||!subject){if(msgEl){msgEl.textContent='Name and subject required.';msgEl.style.color='#dc2626'}return}
  try{
    await callEdgeFunction('save_enquiry_template',{
      name,subject,
      from_name:document.getElementById('tplNewFromName').value.trim()||'Beyond the Box',
      from_email:document.getElementById('tplNewFromEmail').value.trim()||'enquiries@btbescaperooms.co.nz',
      body:document.getElementById('tplNewBody').value,
      active:true,sort_order:enquiryTemplates.length,
    },currentUser.token);
    await loadEnquiryTemplates();renderTemplateAdmin();
  }catch(e){if(msgEl){msgEl.textContent='Error: '+e.message;msgEl.style.color='#dc2626'}}
}
let replyState={};
function toggleReplyPanel(id){
  openReplyId=(openReplyId===id)?null:id;
  if(openReplyId&&!replyState[id])replyState[id]={};
  renderEnquiries();
}
function applyTemplate(id,templateId){
  const e=[...enquiries,...abandonedDrafts].find(x=>x.id===id);
  const tpl=enquiryTemplates.find(t=>t.id===templateId);
  const first=(e?.name||'').trim().split(' ')[0]||'there';
  if(!tpl){replyState[id]={templateId:''};renderEnquiries();return}
  const filledSubject=tpl.subject;
  const filledBody=(tpl.body||'').replace(/\{\{first_name\}\}/g,first);
  replyState[id]={templateId,subject:filledSubject,body:filledBody};
  renderEnquiries();
}
async function sendReply(id){
  const e=[...enquiries,...abandonedDrafts].find(x=>x.id===id);
  const st=replyState[id]||{};
  const tpl=enquiryTemplates.find(t=>t.id===st.templateId);
  const msgEl=document.getElementById(`replyMsg_${id}`);
  if(!e?.email){if(msgEl)msgEl.textContent='No email address on file.';return}
  if(!st.subject||!st.body){if(msgEl)msgEl.textContent='Choose a template or fill in subject and message.';return}
  if(msgEl){msgEl.textContent='Sending…';msgEl.style.color='#6b7280'}
  try{
    const htmlBody=escapeHtml(st.body).replace(/\n/g,'<br>');
    await callEdgeFunction('send_enquiry_template_email',{
      to:e.email,subject:st.subject,htmlBody,
      fromEmail:tpl?.from_email,fromName:tpl?.from_name,
      enquiryId:id,templateName:tpl?.name||st.subject,
      clientId:e.clientId,staffId:currentUser.staffId,
    },currentUser.token);
    if(msgEl){msgEl.textContent='Sent ✓';msgEl.style.color='#059669'}
    delete replyState[id];openReplyId=null;
    await Promise.all([loadEnquiries(),loadOpenEmailInteractions()]);renderEnquiries();
  }catch(err){
    if(msgEl){msgEl.textContent='Error: '+err.message;msgEl.style.color='#dc2626'}
  }
}

// ── TOKEN AUTO-REFRESH ──────────────────────────────────────
// Login tokens expire (Supabase default ~1 hour). Without this, staff
// could get silently logged out or start seeing errors mid-shift.
// This quietly renews the token in the background before it expires.
let tokenRefreshTimer = null;

function scheduleTokenRefresh() {
  clearTimeout(tokenRefreshTimer);
  if (!currentUser || !currentUser.expiresAt) return;
  const msUntilRefresh = Math.max(5000, currentUser.expiresAt - Date.now() - (2 * 60 * 1000));
  tokenRefreshTimer = setTimeout(refreshAuthToken, msUntilRefresh);
}

async function refreshAuthToken() {
  if (!currentUser || !currentUser.refreshToken) return;
  try {
    const r = await fetch(`${SB_AUTH}/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SB_ANON},
      body: JSON.stringify({ refresh_token: currentUser.refreshToken })
    });
    const data = await r.json();
    if (!r.ok || !data.access_token) throw new Error(data.error_description || 'Refresh failed');
    currentUser.token = data.access_token;
    currentUser.refreshToken = data.refresh_token || currentUser.refreshToken;
    currentUser.expiresAt = Date.now() + ((data.expires_in || 3600) * 1000);
    sessionStorage.setItem('btb_user', JSON.stringify(currentUser));
    scheduleTokenRefresh();
  } catch(e) {
    console.error('Token refresh failed — signing out:', e);
    doLogout();
  }
}

// Bundles the data loads that need a real (not anon) token once the
// staff table is locked down to authenticated-only. Called after login
// succeeds and after session restore succeeds — never before.
async function loadAppData(){
  await loadSettings();
  await Promise.all([loadStaff(), loadEnquiries(), loadEnquiryTemplates(), loadOpenEmailInteractions()]);
}

// AUTH — identical login/token logic to btb_app.html
async function doLogin(){
  let email=document.getElementById('loginEmail').value.trim().toLowerCase();if(email&&!email.includes('@'))email+='@btbescaperooms.co.nz';const pass=document.getElementById('loginPass').value;const errEl=document.getElementById('loginError');errEl.textContent='';
  if(!email||!pass){errEl.textContent='Please enter email and password.';return}
  try{
    const r=await fetch(`${SB_AUTH}/token?grant_type=password`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_ANON},body:JSON.stringify({email,password:pass})});
    const data=await r.json();if(!r.ok){errEl.textContent=data.error_description||'Login failed.';return}
    const userId=data.user.id;const token=data.access_token;
    const userRole=await callEdgeFunction('get_my_role',{},token)
      .catch(()=>({name:email.split('@')[0],role:'gamemaster',allowed_tabs:'["calendar"]'}))
      || {name:email.split('@')[0],role:'gamemaster',allowed_tabs:'["calendar"]'};
    let staffId=userId;
    try{const sr=await fetch(`${SB_URL}/rest/v1/staff?user_role_id=eq.${userId}&active=eq.true&select=id`,{headers:H()});const srows=await sr.json();if(srows[0])staffId=srows[0].id}catch(e){}
    currentUser={id:userId,staffId,email,token,refreshToken:data.refresh_token,expiresAt:Date.now()+((data.expires_in||3600)*1000),name:userRole.name,role:userRole.role,allowedTabs:parseAllowedTabs(userRole.allowed_tabs)};
    sessionStorage.setItem('btb_user',JSON.stringify(currentUser));
    scheduleTokenRefresh();
    await loadAppData();
    showApp();
    renderEnqFilters();renderEnquiries();updateHeader();
  }catch(e){errEl.textContent='Connection error.';console.error(e)}
}
function parseAllowedTabs(raw){
  if(!raw) return ['calendar'];
  if(Array.isArray(raw)) return raw;
  try{ const p=JSON.parse(raw); return Array.isArray(p)?p:['calendar']; }
  catch(e){ return ['calendar']; }
}
function doLogout(){clearTimeout(tokenRefreshTimer);currentUser=null;sessionStorage.removeItem('btb_user');document.getElementById('mainApp').style.display='none';document.getElementById('loginScreen').classList.add('active');document.getElementById('loginPass').value=''}
// showApp — trimmed: no Settings-only elements (settingsGroupSetup/cardConfig/cardRoles) exist on this page.
// Adds an allowedTabs check for 'leads', matching the access control already enforced by showTab() in btb_app.html.
function showApp(){
  document.getElementById('loginScreen').classList.remove('active');document.getElementById('mainApp').style.display='';
  document.getElementById('authName').textContent=currentUser.name;
  const vTag=document.getElementById('buildVersionTag');if(vTag)vTag.textContent='v'+BUILD_VERSION;
  const tplBtn=document.getElementById('tplAdminBtn');if(tplBtn)tplBtn.style.display=(currentUser.role==='admin')?'':'none';
  if(currentUser.allowedTabs && !currentUser.allowedTabs.includes('leads')){
    document.getElementById('mainApp').innerHTML='<div style="padding:40px 20px;text-align:center;color:#6b7280">You don\'t have access to Enquiries. Contact an admin.</div>';
  }
}

window.addEventListener('DOMContentLoaded',async()=>{
  const saved=sessionStorage.getItem('btb_user');
  if(saved){
    try{
      const cached=JSON.parse(saved);
      currentUser=cached;
      if(!currentUser.refreshToken){
        // Old-format cached session from before token auto-refresh was added
        // — no refresh token means we can't safely trust it's still valid.
        // Sign out cleanly and let them log in fresh, rather than silently
        // continuing with what could be an already-expired access token.
        console.warn('Cached session has no refresh token — signing out for a fresh login.');
        doLogout();
        renderEnqFilters();renderEnquiries();updateHeader();
        return;
      }
      // Speed fix: only hit the network to refresh the token if it's actually
      // close to expiring (under 5 min left) — skip the round-trip otherwise,
      // since the cached token is still good.
      const msLeft=(currentUser.expiresAt||0)-Date.now();
      if(msLeft<5*60*1000){
        await refreshAuthToken();
        // refreshAuthToken() calls doLogout() if the refresh token itself
        // has expired — in that case currentUser is now null and we stop.
        if(!currentUser){ renderEnqFilters();renderEnquiries();updateHeader(); return; }
      }
      scheduleTokenRefresh();
      // Speed fix: load data and show the app right away using the cached
      // role/permissions from last login, instead of waiting on a get_my_role
      // round-trip first. Validate quietly in the background; only sign out
      // if that check fails.
      await loadAppData();
      showApp();
      renderEnqFilters();renderEnquiries();updateHeader();
      callEdgeFunction('get_my_role',{},currentUser.token).then(roleData=>{
        if(!currentUser)return;
        currentUser.allowedTabs=parseAllowedTabs(roleData.allowed_tabs);
        currentUser.role=roleData.role;
        currentUser.name=roleData.name;
        sessionStorage.setItem('btb_user',JSON.stringify(currentUser));
        showApp();
      }).catch(err=>{
        // The token looked fine locally but Supabase rejected it — don't
        // silently carry on with a broken session, sign out instead.
        console.error('Session validation failed — signing out:',err);
        doLogout();
      });
      return;
    }catch(e){console.error('Session restore failed — signing out:',e);doLogout()}
  }
  // No cached session (or restore failed): still load public-safe data so
  // the login screen's game dropdown etc. isn't empty, but stay logged out.
  await loadSettings();
  await Promise.all([loadStaff(), loadEnquiries()]);
  renderEnqFilters();renderEnquiries();updateHeader();
});
</script>
