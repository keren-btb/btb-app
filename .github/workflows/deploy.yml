name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "Host btbescaperooms.co.nz" >> ~/.ssh/config
          echo "  StrictHostKeyChecking=no" >> ~/.ssh/config

      - name: Deploy HTML and CSS files
        run: |
          rsync -avz --delete \
            --include='/' \
            --include='*.html' \
            --include='*.css' \
            --exclude='*' \
            ./ btbescap@btbescaperooms.co.nz:/home3/btbescap/public_html/test/
