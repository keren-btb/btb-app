name: Deploy to cPanel (test folder)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SFTP (SSH key)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22

          source: "./*"
          target: public_html/test/

          # Required for your older cPanel SSH server
          use_insecure_cipher: true

          # Optional but helpful 
          timeout: 60s
          command_timeout: 30s
          overwrite: true
